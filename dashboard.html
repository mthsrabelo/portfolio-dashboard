<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6fa;color:#1a1a2e;min-height:100vh;padding:2rem}
h1{font-size:22px;font-weight:500;color:#1F3864;margin-bottom:.25rem}
.subtitle{font-size:13px;color:#888;margin-bottom:2rem}
.section-title{font-size:11px;font-weight:600;color:#1F3864;text-transform:uppercase;letter-spacing:.07em;margin:2rem 0 .75rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1rem}
.card{background:#fff;border:0.5px solid #dde3f0;border-radius:12px;padding:1rem 1.25rem}
.card-label{font-size:12px;color:#888;margin-bottom:6px}
.card-value{font-size:20px;font-weight:500;color:#1F3864;white-space:nowrap}
.card-sub{font-size:12px;color:#888;margin-top:4px}
.up{color:#1a7a4a}.down{color:#c0392b}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem}
.chart-box{background:#fff;border:0.5px solid #dde3f0;border-radius:12px;padding:1.25rem}
.chart-title{font-size:13px;font-weight:500;color:#1F3864;margin-bottom:.75rem}
.chart-wide{background:#fff;border:0.5px solid #dde3f0;border-radius:12px;padding:1.25rem;margin-bottom:2rem}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:12px;color:#555}
.legend span{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem}
.risk-card{border-radius:12px;padding:1rem 1.25rem;border:0.5px solid transparent}
.r-alto{background:#fdf0ee;border-color:#f5c4b3}
.r-medio{background:#fdf6e3;border-color:#fac775}
.r-baixo{background:#eaf6f0;border-color:#9FE1CB}
.risk-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.r-alto .risk-label{color:#993C1D}
.r-medio .risk-label{color:#854F0B}
.r-baixo .risk-label{color:#0F6E56}
.risk-value{font-size:18px;font-weight:500;color:#1F3864}
.risk-pct{font-size:12px;color:#888;margin-top:3px}
.risk-items{font-size:11px;color:#aaa;margin-top:5px}
.fx-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
.fx-card{background:#fff;border:0.5px solid #dde3f0;border-radius:12px;padding:1rem 1.25rem}
.bar-bg{background:#eef1f8;border-radius:4px;height:7px;margin:10px 0 6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.loading{text-align:center;padding:4rem;color:#888;font-size:14px}
.error{background:#fff3f3;border:0.5px solid #f5c4b3;border-radius:12px;padding:1.5rem;color:#993C1D;font-size:13px;margin-top:1rem}
@media(max-width:600px){.charts-row,.risk-grid,.fx-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>Portfolio Dashboard</h1>
<p class="subtitle" id="info">Carregando dados...</p>

<div id="loading" class="loading">Buscando dados da planilha...</div>
<div id="error" class="error" style="display:none"></div>
<div id="dash" style="display:none"></div>

<script>
const SHEET_ID = '1C3fxasiOMA954ZRorga5-TUbmfDGoI-6HpAFIMUVXWE';
const SHEET_NAME = 'Portfólio';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

const COLORS = {
  crypto: '#1F3864',
  acoes:  '#378ADD',
  rf:     '#1D9E75',
  fiis:   '#EF9F27',
  caixa:  '#888780',
};

function fmtUSD(v){ return '$' + Math.round(v).toLocaleString('pt-BR'); }
function fmtPct(v){ return (v*100).toFixed(1)+'%'; }
function pct(a,b){ return b>0 ? a/b : 0; }

function parseRows(json) {
  const raw = json.replace(/^[^{]+/, '').replace(/[^}]+$/, '');
  const obj = JSON.parse(raw);
  const rows = obj.table.rows;
  return rows.map(r => {
    const v = i => (r.c[i] && r.c[i].v != null) ? r.c[i].v : 0;
    const lbl = r.c[0] ? (r.c[0].f || String(r.c[0].v)) : '';
    return {
      date:   lbl,
      hodl:   parseFloat(String(v(1)).replace(/[^0-9.-]/g,'')),
      pools:  parseFloat(String(v(2)).replace(/[^0-9.-]/g,'')),
      defi:   parseFloat(String(v(3)).replace(/[^0-9.-]/g,'')),
      crypto: parseFloat(String(v(4)).replace(/[^0-9.-]/g,'')),
      acoes:  parseFloat(String(v(5)).replace(/[^0-9.-]/g,'')),
      rf:     parseFloat(String(v(6)).replace(/[^0-9.-]/g,'')),
      fiis:   parseFloat(String(v(7)).replace(/[^0-9.-]/g,'')),
      caixa:  parseFloat(String(v(8)).replace(/[^0-9.-]/g,'')),
      total:  parseFloat(String(v(9)).replace(/[^0-9.-]/g,'')),
    };
  }).filter(r => r.total > 0);
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dash').style.display = 'block';

  const last = data[data.length - 1];
  const prev = data.length > 1 ? data[data.length - 2] : null;
  const diff = prev ? last.total - prev.total : 0;
  const diffPct = prev && prev.total ? diff / prev.total : 0;
  const sign = diff >= 0 ? '+' : '';
  const cls = diff >= 0 ? 'up' : 'down';

  document.getElementById('info').textContent =
    'Última referência: ' + last.date + ' · ' + data.length + ' meses registrados · Fonte: Google Sheets';

  const dash = document.getElementById('dash');

  // ── Snapshot ──────────────────────────────────────────────────────────────
  dash.innerHTML = `
    <p class="section-title">Snapshot atual</p>
    <div class="cards">
      <div class="card"><div class="card-label">Total do portfólio</div><div class="card-value">${fmtUSD(last.total)}</div><div class="card-sub ${cls}">${sign}${fmtUSD(diff)} vs mês ant.</div></div>
      <div class="card"><div class="card-label">Variação mensal</div><div class="card-value ${cls}">${sign}${fmtPct(diffPct)}</div><div class="card-sub">em USD</div></div>
      <div class="card"><div class="card-label">Crypto</div><div class="card-value">${fmtUSD(last.crypto)}</div><div class="card-sub">${fmtPct(pct(last.crypto,last.total))}</div></div>
      <div class="card"><div class="card-label">Ações USA</div><div class="card-value">${fmtUSD(last.acoes)}</div><div class="card-sub">${fmtPct(pct(last.acoes,last.total))}</div></div>
      <div class="card"><div class="card-label">Renda Fixa</div><div class="card-value">${fmtUSD(last.rf)}</div><div class="card-sub">${fmtPct(pct(last.rf,last.total))}</div></div>
      <div class="card"><div class="card-label">FIIs</div><div class="card-value">${fmtUSD(last.fiis)}</div><div class="card-sub">${fmtPct(pct(last.fiis,last.total))}</div></div>
    </div>

    <p class="section-title">Alocação por classe</p>
    <div class="charts-row">
      <div class="chart-box">
        <p class="chart-title">Distribuição atual</p>
        <div id="donutLeg" class="legend"></div>
        <div style="position:relative;height:220px"><canvas id="donut" role="img" aria-label="Distribuição do portfólio por classe de ativo"></canvas></div>
      </div>
      <div class="chart-box">
        <p class="chart-title">Evolução do total (USD)</p>
        <div style="position:relative;height:260px"><canvas id="totalLine" role="img" aria-label="Evolução do portfólio total em USD ao longo do tempo"></canvas></div>
      </div>
    </div>

    <p class="section-title">Perfil de risco</p>
    <div class="risk-grid" id="riskCards"></div>

    <p class="section-title">Exposição cambial</p>
    <div class="fx-grid" id="fxCards"></div>

    <p class="section-title">Evolução por classe (USD)</p>
    <div class="chart-wide">
      <div id="stackLeg" class="legend"></div>
      <div style="position:relative;height:280px"><canvas id="stack" role="img" aria-label="Evolução histórica do portfólio empilhada por classe de ativo"></canvas></div>
    </div>
  `;

  // ── Donut ─────────────────────────────────────────────────────────────────
  const donutVals   = [last.crypto, last.acoes, last.rf, last.fiis, last.caixa];
  const donutLabels = ['Crypto','Ações USA','Renda Fixa','FIIs','Caixa USD'];
  const donutColors = [COLORS.crypto, COLORS.acoes, COLORS.rf, COLORS.fiis, COLORS.caixa];

  document.getElementById('donutLeg').innerHTML = donutLabels.map((l,i) =>
    `<span><span class="leg-dot" style="background:${donutColors[i]}"></span>${l} ${fmtPct(pct(donutVals[i],last.total))}</span>`
  ).join('');

  new Chart(document.getElementById('donut'), {
    type: 'doughnut',
    data: { labels: donutLabels, datasets: [{ data: donutVals, backgroundColor: donutColors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + fmtUSD(ctx.raw) + ' (' + fmtPct(pct(ctx.raw, last.total)) + ')' } }
      }
    }
  });

  // ── Total line ─────────────────────────────────────────────────────────────
  const labels = data.map(d => d.date);
  new Chart(document.getElementById('totalLine'), {
    type: 'line',
    data: { labels, datasets: [{ data: data.map(d => d.total), borderColor: '#1F3864', backgroundColor: 'rgba(31,56,100,0.07)', fill: true, tension: 0.35, pointRadius: 4, pointBackgroundColor: '#1F3864' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => '$' + Math.round(v/1000) + 'k' }, grid: { color: '#eef1f8' } },
        x: { ticks: { autoSkip: true, maxTicksLimit: 6 }, grid: { display: false } }
      }
    }
  });

  // ── Risco ─────────────────────────────────────────────────────────────────
  const rAlto  = last.crypto;
  const rMedio = last.acoes + last.fiis;
  const rBaixo = last.rf + last.caixa;
  document.getElementById('riskCards').innerHTML = `
    <div class="risk-card r-alto"><div class="risk-label">Risco alto</div><div class="risk-value">${fmtUSD(rAlto)}</div><div class="risk-pct">${fmtPct(pct(rAlto,last.total))} do portfólio</div><div class="risk-items">Crypto — HODL, Pools, DeFi</div></div>
    <div class="risk-card r-medio"><div class="risk-label">Risco moderado</div><div class="risk-value">${fmtUSD(rMedio)}</div><div class="risk-pct">${fmtPct(pct(rMedio,last.total))} do portfólio</div><div class="risk-items">Ações USA · FIIs</div></div>
    <div class="risk-card r-baixo"><div class="risk-label">Proteção</div><div class="risk-value">${fmtUSD(rBaixo)}</div><div class="risk-pct">${fmtPct(pct(rBaixo,last.total))} do portfólio</div><div class="risk-items">Renda Fixa · Caixa USD</div></div>
  `;

  // ── Exposição cambial ─────────────────────────────────────────────────────
  const usd    = last.crypto + last.acoes + last.caixa;
  const brl    = last.rf + last.fiis;
  const usdPct = pct(usd, last.total);
  const brlPct = pct(brl, last.total);
  document.getElementById('fxCards').innerHTML = `
    <div class="fx-card">
      <div class="card-label">Dolarizado (USD)</div>
      <div class="card-value">${fmtUSD(usd)}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${(usdPct*100).toFixed(1)}%;background:${COLORS.acoes}"></div></div>
      <div style="font-size:12px;color:#888">${fmtPct(usdPct)} · Crypto + Ações + Caixa</div>
    </div>
    <div class="fx-card">
      <div class="card-label">Atrelado ao BRL</div>
      <div class="card-value">${fmtUSD(brl)}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${(brlPct*100).toFixed(1)}%;background:${COLORS.rf}"></div></div>
      <div style="font-size:12px;color:#888">${fmtPct(brlPct)} · Renda Fixa + FIIs</div>
    </div>
  `;

  // ── Stacked bar ───────────────────────────────────────────────────────────
  const stackKeys   = ['crypto','acoes','rf','fiis','caixa'];
  const stackLabels = ['Crypto','Ações USA','Renda Fixa','FIIs','Caixa USD'];
  const stackColors = [COLORS.crypto, COLORS.acoes, COLORS.rf, COLORS.fiis, COLORS.caixa];

  document.getElementById('stackLeg').innerHTML = stackLabels.map((l,i) =>
    `<span><span class="leg-dot" style="background:${stackColors[i]}"></span>${l}</span>`
  ).join('');

  new Chart(document.getElementById('stack'), {
    type: 'bar',
    data: {
      labels,
      datasets: stackKeys.map((k,i) => ({
        label: stackLabels[i],
        data: data.map(d => d[k]),
        backgroundColor: stackColors[i],
        stack: 's'
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { stacked: true, ticks: { autoSkip: true, maxTicksLimit: 6 }, grid: { display: false } },
        y: { stacked: true, ticks: { callback: v => '$' + Math.round(v/1000) + 'k' }, grid: { color: '#eef1f8' } }
      }
    }
  });
}

fetch(URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
  .then(txt => { render(parseRows(txt)); })
  .catch(err => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent =
      'Não foi possível carregar os dados. Verifique se a planilha está compartilhada como pública (qualquer pessoa com o link). Erro: ' + err.message;
  });
</script>
</body>
</html>
